<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>163 — Cut Program</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0c0e0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="163 Cut">
</head>
<body>

<div class="wrap">

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">163</span>
      <span class="brand-name">CUT PROGRAM</span>
    </div>
    <div class="progress-chip">
      <span id="progressCount">0 / 163</span>
      <div class="progress-track"><div id="progressFill" class="progress-fill"></div></div>
    </div>
  </header>

  <main id="mainContent">

    <section class="calendar-card">
      <div class="cal-nav">
        <button type="button" class="cal-nav-btn" id="calPrev">‹</button>
        <div class="cal-month-label" id="calMonthLabel">July 2026</div>
        <button type="button" class="cal-nav-btn" id="calNext">›</button>
      </div>
      <div class="cal-weekdays">
        <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-legend">
        <span class="legend-item"><span class="legend-dot dot-done"></span>Done</span>
        <span class="legend-item"><span class="legend-dot dot-today"></span>Today</span>
        <span class="legend-item"><span class="legend-dot dot-missed"></span>Missed</span>
      </div>
    </section>

    <section class="detail-card" id="detailCard">
      <!-- filled dynamically -->
    </section>

    <section class="foot-section">
      <button type="button" class="backup-toggle" id="backupToggle">Backup / restore progress</button>
      <div class="backup-panel" id="backupPanel" style="display:none;">
        <p class="backup-note">Copy this text somewhere safe (Notes app, WhatsApp to yourself, etc). If your phone ever wipes the app's data, paste it back here to restore.</p>
        <textarea id="backupText" class="backup-textarea" rows="4"></textarea>
        <div class="backup-actions">
          <button type="button" id="backupCopyBtn" class="backup-btn">Copy backup</button>
          <button type="button" id="backupRestoreBtn" class="backup-btn">Restore from text above</button>
        </div>
        <div class="backup-status" id="backupStatus"></div>
      </div>
    </section>

  </main>

</div>

<script src="script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
